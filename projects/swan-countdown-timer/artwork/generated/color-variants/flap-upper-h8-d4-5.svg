<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <clipPath id="clip">
      <rect x="0" y="0" width="1000" height="500" />
    </clipPath>
  </defs>
  <rect x="0" y="0" width="1000" height="500" fill="red" />
  <g clip-path="url(#clip)" transform="translate(0 0)" fill="black">
    <text x="500" y="780" text-anchor="middle" font-family="'Segoe UI Historic', 'Noto Sans Egyptian Hieroglyphs', serif" font-size="700">&#x13250;</text>
  </g>
</svg>
